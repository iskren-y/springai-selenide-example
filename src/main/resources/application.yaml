spring:
  ai:
    model:
      chat: ollama
    ollama:
      base-url: http://host.docker.internal:11434
      chat:
        options:
          model: gemma4:26b
          temperature: 1.0
          num-ctx: 65536            # ← Ollama's recommended agent floor
          num-keep: 512             # ← protect system prompt + tool schemas from eviction
          internal-tool-execution-enabled: true

telegram:
  bot:
    apiKey: ${TELEGRAM_BOT_API_KEY}